<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fleet Cats</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="app">
        <header class="header">
            <h1 class="header-title">🐱 Fleet Cats</h1>
            <p class="header-subtitle">Your fleet vehicles, appearing as cats on the map</p>
        </header>

        <div id="loading-section" class="loading-section">
            <p id="loading-text">Loading cats…</p>
        </div>

        <div id="map-section" class="map-section hidden">
            <div id="map" class="map-container"></div>
            <div class="map-legend">
                <span class="legend-item">🐱 = Vehicle location</span>
                <button type="button" id="btn-refresh" class="btn-refresh">Refresh</button>
            </div>
        </div>

        <div id="error-section" class="error-section hidden">
            <p id="error-text"></p>
        </div>
    </div>

    <script src="addin.js"></script>
</body>
</html>
